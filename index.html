<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beefcore Redirect</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .error-message {
            text-align: center;
            font-size: 24px;
            color: #d32f2f;
            padding: 20px;
            border: 2px solid #d32f2f;
            border-radius: 10px;
            background-color: #fff;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <div id="error-message" class="error-message" style="display: none;">
        Welp, looks like Beefcore is currently down... Check back soon! 🥩
    </div>
    <script>
        async function checkTunnel() {
            try {
                const response = await fetch('https://array-video-excluded-inputs.trycloudflare.com', { mode: 'cors' });
                const text = await response.text();
                // Check for specific Cloudflare Tunnel errors in response body
                if (text.includes('Error 1033') || text.includes('Cloudflare Tunnel Error')) {
                    document.getElementById('error-message').style.display = 'block';
                    console.error('Cloudflare Tunnel error detected in response: ' + text.substring(0, 100));
                    return;
                }
                // If no error, redirect to the tunnel URL
                window.location.href = 'https://array-video-excluded-inputs.trycloudflare.com';
            } catch (e) {
                // Network errors or CORS issues indicate the site is unreachable
                document.getElementById('error-message').style.display = 'block';
                console.error('Failed to reach tunnel URL: ' + e.message);
            }
        }
        // Run check when page loads
        window.onload = checkTunnel;
    </script>
</body>
</html>
