<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beefcore</title>
    <meta property="og:title" content="Beefcore" />
    <meta property="og:description" content="somethin" />
    <meta property="og:image" content="https://raw.githubusercontent.com/MinimackStudios/image-hosting/refs/heads/main/misc/steak.jpg" />
    <meta property="og:url" content="https://beefcore.github.io" />
    <meta name="theme-color" content="#ff0031" />
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .error-message {
            text-align: center;
            font-size: 24px;
            color: #d32f2f;
            padding: 20px;
            border: 2px solid #d32f2f;
            border-radius: 10px;
            background-color: #fff;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <div id="error-message" class="error-message" style="display: none;">
        Welp, looks like Beefcore is currently down... Check back soon! 🥩
    </div>
    <script>
        function checkTunnel() {
            const path = window.location.pathname || '';
            const baseUrl = 'https://creativity-punch-general-potatoes.trycloudflare.com';
            const targetUrl = baseUrl.endsWith('/') ? baseUrl + path.replace(/^\//, '') : baseUrl + (path ? '/' + path.replace(/^\//, '') : '');
            console.log('Base URL: ' + baseUrl);
            console.log('Path: ' + path);
            console.log('Target URL: ' + targetUrl);
            if (baseUrl && !baseUrl.includes('undefined')) {
                window.location.href = targetUrl;
            } else {
                document.getElementById('error-message').style.display = 'block';
                console.error('Invalid tunnel URL: ' + baseUrl);
            }
        }
        window.onload = checkTunnel;
    </script>
</body>
</html>
