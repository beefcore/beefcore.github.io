<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beefcore Redirect</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .error-message {
            text-align: center;
            font-size: 24px;
            color: #d32f2f;
            padding: 20px;
            border: 2px solid #d32f2f;
            border-radius: 10px;
            background-color: #fff;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <div id="error-message" style="display: none;">
        Welp, looks like Beefcore is currently down... Check back soon!
    </div>
    <script>
        async function checkTunnel() {
            try {
                const response = await fetch('https://baseline-football-throw-annoying.trycloudflare.com', { method: 'HEAD', mode: 'cors' });
                // Common Cloudflare Tunnel error codes
                const errorCodes = [502, 503, 520, 521, 522, 523, 524, 525, 527];
                if (errorCodes.includes(response.status)) {
                    document.getElementById('error-message').style.display = 'block';
                    console.error('Cloudflare Tunnel error detected: HTTP ' + response.status);
                    return;
                }
                // Check response body for specific error messages
                const text = await response.text();
                if (text.includes('Failed to connect') || text.includes('Tunnel unavailable')) {
                    document.getElementById('error-message').style.display = 'block';
                    console.error('Cloudflare Tunnel error in response body');
                    return;
                }
                // If no error, redirect to the tunnel URL
                window.location.href = 'https://baseline-football-throw-annoying.trycloudflare.com';
            } catch (e) {
                // Network errors or CORS issues indicate tunnel is likely down
                document.getElementById('error-message').style.display = 'block';
                console.error('Error fetching tunnel URL: ' + e.message);
            }
        }
        // Run check when page loads
        window.onload = checkTunnel;
    </script>
</body>
</html>
