<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    window.onload = function() {
      const currentPath = window.location.pathname;
      const redirectUrl = `https://beefcore.loca.lt${currentPath}`;
      window.location.href = redirectUrl;
    };
  </script>
</head>
<body>
  <p>Redirecting to <a href="https://beefcore.loca.lt">beefcore.loca.lt</a>...</p>
</body>
</html>
